name = "customshowers-contact"
main = "worker.js"
compatibility_date = "2024-09-23"

# Cloudflare Email Routing binding
# Requires Email Routing to be enabled on your domain in the Cloudflare dashboard.
[[send_email]]
name = "SEND_EMAIL"

# Environment variables are set in the Cloudflare dashboard:
#   Workers & Pages → customshowers-contact → Settings → Variables & Secrets
#
#   HUBSPOT_API_TOKEN    = your HubSpot Private App token
#   RECAPTCHA_SECRET_KEY = your Google reCAPTCHA v2 secret key
